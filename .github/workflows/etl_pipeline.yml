name: ETL Pipeline — Conciliación Bancaria

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    name: Tests & Validación
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests
        run: pytest tests/ -v --tb=short

  etl:
    name: Ejecutar ETL Pipeline
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline ETL
        run: python main.py

      - name: Verificar outputs generados
        run: |
          echo "=== Archivos generados ==="
          ls -la output/
          ls -la output/charts/
          echo "=== Dashboard HTML ==="
          head -5 output/index.html

      - name: Upload artifact para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

  deploy:
    name: Deploy Dashboard a GitHub Pages
    needs: etl
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
